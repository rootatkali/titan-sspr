<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Password Reset{% endblock %} — IT Self-Service</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous">
  <style>
    body { background: #f5f7fa; }
    .card { max-width: 480px; margin: 80px auto; box-shadow: 0 2px 12px rgba(0,0,0,.08); }
    .card-header { background: #0078d4; color: #fff; }
  </style>
</head>
<body>
  <div class="container">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div style="max-width:480px;margin:24px auto 0;">
          {% for category, message in messages %}
            <div class="alert alert-{{ 'success' if category == 'success' else ('warning' if category == 'warning' else ('info' if category == 'info' else 'danger')) }} alert-dismissible fade show" role="alert">
              {{ message }}
              <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
          integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmTVoRs3/eLR/T1KQiCCtvAHpGs8"
          crossorigin="anonymous"></script>
</body>
</html>
