services:
  sspr:
    build: .
    restart: unless-stopped
    expose:
      - "8080"
    env_file: .env
    volumes:
      - sspr-sessions:/app/flask_session
      - sspr-data:/app/data
      - ./certs/dc-ca.pem:/certs/dc-ca.pem:ro
    networks:
      - internal

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - sspr
    networks:
      - internal

volumes:
  sspr-sessions:
  sspr-data:

networks:
  internal:
